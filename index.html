<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Sabor Caribe</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header>
        <h1>🍽 Restaurante Sabor Caribe</h1>
        <p>La mejor comida de la región</p>
    </header>

    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#menu">Menú</a>
        <a href="#reservas">Reservas</a>
    </nav>

    <section id="inicio">
        <h2>Bienvenidos</h2>

        <p>
            Disfruta de una experiencia gastronómica única con nuestros platos típicos.
        </p>
    </section>

    <section id="menu">

        <h2>Nuestro Menú</h2>

        <div class="card">
            <h3>🐟 Mojarra Frita</h3>
            <p>$28.000 COP</p>
        </div>

        <div class="card">
            <h3>🦐 Arroz de Mariscos</h3>
            <p>$35.000 COP</p>
        </div>

        <div class="card">
            <h3>🍗 Pollo Asado</h3>
            <p>$25.000 COP</p>
        </div>

    </section>

    <section id="reservas">

        <h2>Reserva tu Mesa</h2>

        <input
            type="text"
            id="nombre"
            placeholder="Ingrese su nombre">

        <button onclick="reservar()">
            Reservar
        </button>

        <p id="mensaje"></p>

    </section>

    <script src="./js/script.js"></script>

</body>

</html>
